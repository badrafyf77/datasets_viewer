# One-sample smoke test config used by the viewer "Run 1-Sample Test" button.
# It writes to data/smoke_test/ so it does not overwrite the full pipeline output.

project:
  seed: 7

text_generation:
  output_path: data/smoke_test/texts.jsonl
  prompt_path: prompts/text_generation_prompt.txt
  num_texts: 1
  batch_size: 1
  max_retries_per_batch: 5
  max_words: 25
  min_words: 3
  resume: false

  provider: openai_compatible
  api_base_url: https://lightning.ai/api/v1/
  api_key_env: LIGHTNING_API_KEY
  model: openai/gpt-5
  temperature: 0.9
  top_p: 0.95
  max_tokens: 1200
  request_timeout_seconds: 120

  language_mix_distribution:
    darija_french: 1.0
    darija_english: 0.0
    darija_french_english: 0.0
    pure_darija: 0.0

  domains:
    - phone_call_support
    - appointment_booking
    - delivery_order_tracking
    - bank_insurance_calls
    - university_admin_calls
    - healthcare_appointment_calls
    - job_interview_calls
    - technical_support
    - project_team_calls
    - ecommerce_returns_refunds
    - travel_hotel_taxi_calls
    - family_friend_casual_calls

audio_generation:
  texts_path: data/smoke_test/texts.jsonl
  output_dir: data/smoke_test
  audio_subdir: audio
  logs_dir: data/smoke_test/generation_logs
  target_hours: 0.01
  sample_rate: 24000
  min_duration_seconds: 1.0
  max_duration_seconds: 25.0
  source_label: omnivoice_synthetic_smoke

  tts_backend: omnivoice
  tts_model_name_or_path: k2-fsa/OmniVoice
  device_map: cuda:0
  dtype: float16

  reference_speakers_dir: data/reference_speakers
  default_reference_audio: ""
  default_reference_text: ""

  duplicate_second_speaker_probability: 0.0
  augmentation_probability: 0.0
  augmentation_suffix: phone

splits:
  train: 1.0
  validation: 0.0
  test: 0.0
  real_human_test_metadata: ""

review:
  sample_size: 1
  output_path: data/smoke_test/review_samples.csv

quality:
  bad_samples_path: data/smoke_test/bad_samples.csv
  allowed_duplicate_text_versions: 1
